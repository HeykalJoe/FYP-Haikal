version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_NAME=${DB_NAME:-confession_db}
      - SMTP_PASS=${SMTP_PASS}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ENABLE_USER_SUGGESTIONS=${ENABLE_USER_SUGGESTIONS:-false}
    depends_on:
      - mysql
    networks:
      - confession-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root}
      - MYSQL_DATABASE=${DB_NAME:-confession_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - confession-network

volumes:
  mysql_data:

networks:
  confession-network:

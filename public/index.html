<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page.title">Sintok's Echoes - Confession Space</title>
  <link rel="stylesheet" href="style.css?v=20251116">
  <style>
    /* Centered toast popup with close button and frame */
    #toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateY(10px);
      min-width: 320px;
      max-width: calc(100% - 48px);
      padding: 20px 24px;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 12px 40px rgba(2,6,20,0.6);
      border: 2px solid rgba(255,255,255,0.2);
      opacity: 0;
      transition: opacity 240ms ease, transform 240ms ease;
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      pointer-events: auto;
    }
    #toast.show { opacity: 1; transform: translate(-50%, -50%); }
    #toast.success { background: linear-gradient(90deg,#2a9d8f,#4ecdc4); }
    #toast.error { background: linear-gradient(90deg,#e63946,#ff6b6b); }
    #toast.info { background: linear-gradient(90deg,#4ecdc4,#ffd24d); color:#fff }
    
    #toast-message {
      flex: 1;
    }
    
    #toast-close {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      flex-shrink: 0;
      transition: background 200ms ease;
    }
    #toast-close:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body class="page-preload">
  <!-- Navigation (shared markup) -->
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="back-btn" class="back-btn" title="Back">←</button>
      <div style="display:flex;flex-direction:column;">
        <div class="nav-brand">
          <img src="logo2.png" alt="Sintok's Echoes" class="site-logo">
        </div>
        <div id="lang-toggle" style="font-size:13px;margin-top:4px;cursor:pointer;">Bahasa Melayu / English</div>
      </div>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link" data-page="index" data-i18n="nav.home">Home</a>
      <a href="index.html#confess" class="nav-link" data-page="confess" data-i18n="nav.confess">Confess</a>
      <a href="dashboard.html" class="nav-link" data-page="dashboard" data-i18n="nav.dashboard">Dashboard</a>
      <a href="admin.html" class="nav-link" data-page="admin" data-i18n="nav.admin">Admin</a>
      <a href="about.html" class="nav-link" data-page="about" data-i18n="nav.about">About Us</a>
    </div>
  </nav>

  <!-- Homepage Section -->
  <div class="main-container" id="homepage-section">
    <div class="content-left">
      <h1 class="main-title" data-i18n="home.title">Welcome UUMers!</h1>
      <p class="subtitle" data-i18n="home.subtitle">A safe and anonymous space for UUM students to share their stories, feelings, and experiences.</p>
      <button id="get-started-btn" class="send-button" data-i18n="btn.getStarted" style="width:auto; padding: 12px 32px; font-size: 18px; margin-top: 20px;">Get Started</button>
    </div>
    <div class="content-right">
      <div class="logo-container">
        <img src="UUM_logo.png?v=20251116" alt="UUM Logo" class="university-logo">
      </div>
    </div>
  </div>

  <!-- Confession Section (hidden by default) -->
  <div class="main-container" id="confess-section" style="display:none;">
    <div class="content-left">
      <h1 class="main-title" data-i18n="confess.title">Confession Space</h1>
      <p class="subtitle">Here you can share your stories, secrets, and feelings without revealing your identity.</p>
      <div class="confession-form">
        <textarea id="confession" placeholder="Type your confession here..." class="confession-input" data-i18n="confess.placeholder" style="background:#ffffff;color:#000;border-radius:8px;padding:12px;border:1px solid #ddd;box-shadow:none;"></textarea>
        <button id="confess-send" onclick="sendConfession()" class="send-button" data-i18n="btn.send">Send</button>
        <p id="status" class="status-message"></p>
        <div id="summary-box" style="display:none; margin-top:10px; background:#f7f7f7; border-radius:8px; padding:10px; border:1px solid #e0e0e0; color:#333;"></div>
      </div>
    </div>
    <div class="content-right">
      <div class="logo-container">
        <img src="UUM_logo.png?v=20251116" alt="UUM Logo" class="university-logo">
      </div>
    </div>
  </div>

  <script>
  // SPA navigation logic
  const homepageSection = document.getElementById('homepage-section');
  const confessSection = document.getElementById('confess-section');
  (function attachNavHandlers() {
    const links = document.querySelectorAll('.nav-link[data-page]');
    window.addEventListener('DOMContentLoaded', () => { requestAnimationFrame(() => document.body.classList.remove('page-preload')); });
    links.forEach(a => {
      const page = a.dataset.page;
      if (page === 'index' || page === 'confess' || page === 'about') {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
          a.classList.add('active');
          if (page === 'confess') { homepageSection.style.display = 'none'; confessSection.style.display = ''; }
          else { homepageSection.style.display = ''; confessSection.style.display = 'none'; }
        });
      } else {
        a.addEventListener('click', (e) => {
          const href = a.getAttribute('href');
          if (!href || href.startsWith('#')) return;
          const current = (window.location.pathname.split('/').pop() || 'index.html').toLowerCase();
          const target = href.split('/').pop().toLowerCase();
          if (current === target) { document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active')); a.classList.add('active'); return; }
          e.preventDefault();
          document.body.classList.add('page-exit');
          setTimeout(() => { window.location.href = href; }, 340);
        });
      }
    });
    const path = (window.location.pathname.split('/').pop() || 'index.html').toLowerCase();
    const hash = (window.location.hash || '').toLowerCase();
    let activeSelector = '.nav-link[data-page="index"]';
    if (path === 'dashboard.html') activeSelector = '.nav-link[data-page="dashboard"]';
    if (path === 'admin.html') activeSelector = '.nav-link[data-page="admin"]';
    if (hash.includes('#confess') || hash === '#confess') activeSelector = '.nav-link[data-page="confess"]';
    const activeEl = document.querySelector(activeSelector);
    if (activeEl) activeEl.classList.add('active');
    if (hash.includes('#confess')) { homepageSection.style.display = 'none'; confessSection.style.display = ''; }
  })();

  function showToast(message, type = 'info', duration = 4200) {
    const toast = document.getElementById('toast');
    if (!toast) return;
    const msgElement = document.getElementById('toast-message');
    if (msgElement) msgElement.textContent = message;
    toast.className = '';
    toast.classList.add(type);
    requestAnimationFrame(() => toast.classList.add('show'));
    if (toast._hideTimer) clearTimeout(toast._hideTimer);
    toast._hideTimer = setTimeout(() => { toast.classList.remove('show'); toast._hideTimer = null; }, duration);
  }

  (function() {
    const back = document.getElementById('back-btn');
    if (!back) return;
    back.addEventListener('click', (e) => {
      const csVisible = confessSection.style.display !== 'none';
      if (csVisible) { confessSection.style.display = 'none'; homepageSection.style.display = ''; document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active')); const homeLink = document.querySelector('.nav-link[data-page="index"]'); if (homeLink) homeLink.classList.add('active'); return; }
      if (window.history && window.history.length > 1) window.history.back(); else window.location.href = 'index.html';
    });
  })();

  document.getElementById('get-started-btn').onclick = function(e) {
    e.preventDefault();
    document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
    const confessLink = document.querySelector('.nav-link[data-page="confess"]'); if (confessLink) confessLink.classList.add('active');
    const hp = homepageSection; const cs = confessSection; hp.classList.add('zoom-out'); setTimeout(() => { hp.style.display = 'none'; hp.classList.remove('zoom-out'); cs.style.display = ''; cs.classList.add('zoom-in'); void cs.offsetWidth; cs.classList.add('zoom-in-active'); setTimeout(()=>{ cs.classList.remove('zoom-in'); cs.classList.remove('zoom-in-active'); },380); }, 360);
  };

  // Confession logic
  async function sendConfession() {
    const message = document.getElementById('confession').value;
    const currentLang = (localStorage.getItem('site_lang') || 'ms');
    const status = document.getElementById('status');
    if (!message.trim()) {
      const msg = (window.__i18n && window.__i18n.t) ? window.__i18n.t('toast.pleaseWrite','Please write something!') : 'Please write something!';
      showToast(msg, 'error'); status.innerText = msg; status.style.color = '#ff6b6b'; return;
    }
    try {
      const response = await fetch('/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message, lang: currentLang }) });
      let data = {};
      try { data = await response.json(); } catch (jsonErr) { data = { message: 'Unknown error from server.' }; }
      const summaryBox = document.getElementById('summary-box');
      if (data.summary) { summaryBox.style.display = 'block'; const label = (window.__i18n && window.__i18n.t) ? window.__i18n.t('confess.summaryLabel','Summary:') : 'Summary:'; summaryBox.innerHTML = `<strong>${label}</strong> ${data.summary}`; } else { summaryBox.style.display = 'none'; }
      if (response.ok) {
        const wantsCopy = window.confirm((window.__i18n && window.__i18n.t) ? window.__i18n.t('confirm.copyPrompt','Do you want a copy of your confession to be sent to your email?') : 'Do you want a copy of your confession to be sent to your email?');
        if (wantsCopy) {
          let userEmail = prompt((window.__i18n && window.__i18n.t) ? window.__i18n.t('prompt.enterEmail','Please enter your email address:') : 'Please enter your email address:');
          if (userEmail && userEmail.includes('@')) {
            const copyResponse = await fetch('/send-copy', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message, userEmail, lang: currentLang }) });
            let copyData = {};
            try { copyData = await copyResponse.json(); } catch (jsonErr) { copyData = { message: 'Unknown error from server.' }; }
            if (copyResponse.ok) {
              const okCopy = copyData.message || ((window.__i18n && window.__i18n.t) ? window.__i18n.t('toast.copySent','A copy of your confession was sent to your email.') : 'A copy of your confession was sent to your email.');
              showToast(okCopy,'success'); status.innerText = okCopy; status.style.color = '#fff';
            }
            else {
              const msg = copyData.message || ((window.__i18n && window.__i18n.t) ? window.__i18n.t('toast.sendError','Failed to send a copy to your email.') : 'Failed to send a copy to your email.');
              showToast(msg,'error'); status.innerText = msg; status.style.color = '#ff6b6b';
            }
          } else {
            const invalidMsg = (window.__i18n && window.__i18n.t) ? window.__i18n.t('toast.invalidEmail','Invalid email address. No copy sent.') : 'Invalid email address. No copy sent.';
            showToast(invalidMsg,'error'); status.innerText = invalidMsg; status.style.color = '#ff6b6b';
          }
        } else {
          const okMsg = data.message || ((window.__i18n && window.__i18n.t) ? window.__i18n.t('status.confessionSent','Confession sent successfully!') : 'Confession sent successfully!');
          showToast(okMsg,'success'); status.innerText = okMsg; status.style.color = '#4ecdc4';
        }
        document.getElementById('confession').value = '';
      } else {
        const errMsg = data.message || ((window.__i18n && window.__i18n.t) ? window.__i18n.t('toast.sendError','Error sending confession. Please try again.') : 'Error sending confession. Please try again.');
        showToast(errMsg,'error'); status.innerText = errMsg; status.style.color = '#ff6b6b';
      }
    } catch (err) {
      const failMsg = (window.__i18n && window.__i18n.t) ? window.__i18n.t('toast.sendError','Error sending confession. Please try again.') : 'Error sending confession. Please try again.';
      showToast(failMsg,'error'); status.innerText = failMsg; status.style.color = '#ff6b6b'; document.getElementById('summary-box').style.display = 'none';
    }
  }

  // Auto-resize textarea
  document.getElementById('confession').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
  </script>
  <script src="i18n.js"></script>
  <div id="toast" role="status" aria-live="polite">
    <span id="toast-message"></span>
    <button id="toast-close" aria-label="Close notification">×</button>
  </div>
  <script>
    document.getElementById('toast-close').addEventListener('click', () => {
      const toast = document.getElementById('toast');
      if (toast) {
        toast.classList.remove('show');
        if (toast._hideTimer) clearTimeout(toast._hideTimer);
      }
    });
  </script>
</body>
</html>

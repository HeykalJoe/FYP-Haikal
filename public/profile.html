<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Sintok's Echoes</title>
  <link rel="stylesheet" href="style.css?v=20251116">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-brand">Sintok's Echoes</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="index.html#confess" class="nav-link">Confess</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <a href="#" class="nav-link">About Us</a>
    </div>
  </nav>

  <!-- Profile Content -->
  <div class="main-container">
    <div class="content-left">
      <h1 class="main-title">Profile</h1>
      <form class="profile-form">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" class="confession-input" placeholder="Enter your username">
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" class="confession-input" placeholder="Enter your email">
        <br><br>
        <button type="submit" class="send-button">Save</button>
        <p id="profile-status" class="status-message"></p>
      </form>
    </div>
    <div class="content-right">
      <div class="logo-container">
        <img src="UUM_logo.png?v=20251116" alt="UUM Logo" class="university-logo">
      </div>
    </div>
  </div>

  <script>
    // Simple local save for demonstration
    const form = document.querySelector('.profile-form');
    const status = document.getElementById('profile-status');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      if (!username.trim() || !email.trim()) {
        status.innerText = 'Please fill in all fields!';
        status.style.color = '#ff6b6b';
        return;
      }
      localStorage.setItem('profile_username', username);
      localStorage.setItem('profile_email', email);
      status.innerText = 'Profile saved!';
      status.style.color = '#4ecdc4';
    });

    // Load saved data
    window.onload = function() {
      document.getElementById('username').value = localStorage.getItem('profile_username') || '';
      document.getElementById('email').value = localStorage.getItem('profile_email') || '';
    };
  </script>
</body>
</html>
